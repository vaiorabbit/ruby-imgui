name: Build (Windows)

on:
  workflow_call:
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    runs-on: windows-latest
    strategy:
      fail-fast: false
      max-parallel: 1

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        ref: ${{github.ref}}
        fetch-depth: 1
        submodules: recursive

    - name: Build imgui dll
      shell: cmd
      run: |
        cd dll
        build_imgui_windows.cmd cmake
        cd ..

    - name: Commit new libraries
      continue-on-error: true
      run: |
        git config user.name "$env:GITHUB_ACTOR"
        git config user.email "$env:GITHUB_ACTOR"
        git add lib/*
        git commit -a -m "commit by $env:GITHUB_ACTOR via GitHub Actions"
        git push --force-with-lease -u origin ${{github.ref}}
